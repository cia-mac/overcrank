<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overcrank — High-Speed Camera Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0d0d0d;
    --surface:      #141414;
    --surface-2:    #1a1a1a;
    --surface-3:    #222222;
    --border:       #272727;
    --border-focus: #3a3a3a;
    --accent:       #e8ff00;
    --accent-dim:   #b8cc00;
    --accent-glow:  rgba(232,255,0,0.08);
    --text:         #f0f0f0;
    --text-dim:     #909090;
    --text-muted:   #4a4a4a;
    --green:        #22c55e;
    --green-bg:     rgba(34,197,94,0.1);
    --green-border: rgba(34,197,94,0.25);
    --orange:       #f97316;
    --orange-bg:    rgba(249,115,22,0.1);
    --orange-border:rgba(249,115,22,0.25);
    --radius-sm:    6px;
    --radius:       10px;
    --radius-lg:    14px;
    --mono:         'SF Mono', 'Fira Code', 'Consolas', monospace;
    --sans:         'Inter', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    padding: 28px 48px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  header h1 {
    font-family: var(--sans);
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  header .tagline {
    color: var(--text-muted);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.02em;
    padding-left: 18px;
    border-left: 1px solid var(--border);
  }

  /* ── Search panel ── */
  .search-panel {
    padding: 32px 48px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .search-panel-inner {
    max-width: 900px;
  }

  .search-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    flex-wrap: wrap;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .field input {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 500;
    padding: 12px 16px;
    width: 148px;
    outline: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }

  .field input:focus {
    border-color: var(--border-focus);
    background: var(--surface-3);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }

  .field input::placeholder {
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .input-sep {
    font-family: var(--mono);
    font-size: 24px;
    color: var(--text-muted);
    padding-bottom: 12px;
    user-select: none;
  }

  .search-actions {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    padding-bottom: 0;
  }

  button#search {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 13px 26px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    height: 48px;
  }

  button#search:hover {
    background: var(--accent-dim);
  }

  button#search:active {
    transform: scale(0.98);
  }

  button#clear {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    padding: 13px 20px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    height: 48px;
  }

  button#clear:hover {
    border-color: var(--border-focus);
    color: var(--text);
  }

  /* ── Presets ── */
  .presets-row {
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .presets-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-right: 4px;
    flex-shrink: 0;
  }

  .preset-btn {
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 16px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .preset-btn:hover {
    border-color: var(--border-focus);
    color: var(--text);
    background: var(--surface-3);
  }

  .preset-btn.active {
    background: var(--accent-glow);
    border-color: rgba(232,255,0,0.4);
    color: var(--accent);
  }

  /* ── Results header / toolbar ── */
  .results-toolbar {
    padding: 16px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .results-count {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
  }

  .results-desc {
    font-size: 15px;
    color: var(--text-dim);
  }

  .sort-group {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sort-label {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .sort-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .sort-btn.active {
    border-color: rgba(232,255,0,0.4);
    color: var(--accent);
    background: var(--accent-glow);
  }

  .sort-btn:hover:not(.active) {
    border-color: var(--border-focus);
    color: var(--text);
  }

  /* ── Card grid ── */
  .cards-grid {
    padding: 32px 48px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  .camera-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 22px 24px;
    transition: border-color 0.15s, background 0.15s;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .camera-card:hover {
    border-color: var(--border-focus);
    background: var(--surface-2);
  }

  /* Card header */
  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .card-identity {
    flex: 1;
    min-width: 0;
  }

  .card-brand {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 4px;
  }

  .card-model {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-status {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 3px;
  }

  /* Verified badge */
  .badge {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .badge-verified {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green-border);
  }

  .badge-unverified {
    background: var(--orange-bg);
    color: var(--orange);
    border: 1px solid var(--orange-border);
  }

  /* Card meta row */
  .card-meta {
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
  }

  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .meta-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .meta-value {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-dim);
  }

  /* Mode chips */
  .card-modes-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  .modes-chips {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .mode-chip {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    transition: background 0.1s, border-color 0.1s;
  }

  .mode-chip.match {
    background: rgba(232,255,0,0.05);
    border-color: rgba(232,255,0,0.14);
  }

  .chip-res {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-dim);
    width: 140px;
    flex-shrink: 0;
  }

  .chip-fps {
    font-family: var(--mono);
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.5px;
    width: 110px;
    flex-shrink: 0;
  }

  .chip-fps-unit {
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 2px;
    letter-spacing: 0;
  }

  .chip-note {
    font-size: 13px;
    color: var(--text-muted);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .more-modes {
    font-size: 12px;
    color: var(--text-muted);
    padding: 4px 12px;
    font-style: italic;
  }

  /* ── Intro block ── */
  .intro-block {
    padding: 48px 48px 0;
    max-width: 680px;
  }

  .intro-block p {
    font-size: 16px;
    color: var(--text-dim);
    line-height: 1.75;
  }

  .intro-block p + p {
    margin-top: 10px;
  }

  .db-stats {
    padding: 20px 48px 0;
    font-size: 14px;
    color: var(--text-muted);
    display: flex;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }

  .db-stats .stat {
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 14px;
  }

  .db-stats .dot {
    color: var(--text-muted);
  }

  /* ── Empty state ── */
  .empty {
    padding: 80px 48px;
    text-align: center;
    color: var(--text-muted);
  }

  .empty h2 {
    font-size: 20px;
    color: var(--text-dim);
    font-weight: 600;
    margin-bottom: 8px;
  }

  .empty p {
    font-size: 15px;
  }

  /* ── Text search ── */
  .text-search-row {
    margin-top: 16px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .text-search-row input {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 400;
    padding: 10px 16px;
    width: 320px;
    outline: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }

  .text-search-row input:focus {
    border-color: var(--border-focus);
    background: var(--surface-3);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }

  .text-search-row input::placeholder {
    color: var(--text-muted);
  }

  /* ── Manufacturer filter ── */
  .mfr-filter-row {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .mfr-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-right: 4px;
    flex-shrink: 0;
  }

  .mfr-chip {
    background: var(--surface-3);
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    user-select: none;
  }

  .mfr-chip:hover {
    border-color: var(--border-focus);
    color: var(--text);
  }

  .mfr-chip.active {
    background: var(--accent-glow);
    border-color: rgba(232,255,0,0.4);
    color: var(--accent);
  }

  .mfr-chip.all-chip {
    font-weight: 600;
  }

  /* ── Responsive ── */
  @media (max-width: 800px) {
    header,
    .search-panel,
    .results-toolbar,
    .cards-grid,
    .intro-block,
    .db-stats {
      padding-left: 16px;
      padding-right: 16px;
    }

    header {
      padding-top: 20px;
      padding-bottom: 16px;
    }

    header .tagline {
      display: none;
    }

    .search-row {
      gap: 8px;
    }

    .field input {
      width: 90px;
      font-size: 16px;
      padding: 10px 12px;
    }

    .field label {
      font-size: 11px;
    }

    .input-sep {
      font-size: 20px;
      padding-bottom: 10px;
    }

    .search-actions {
      width: 100%;
      margin-top: 4px;
    }

    button#search, button#clear {
      flex: 1;
      height: 44px;
      font-size: 14px;
    }

    .presets-row {
      margin-top: 14px;
      gap: 6px;
    }

    .preset-btn {
      font-size: 12px;
      padding: 5px 12px;
    }

    .cards-grid {
      grid-template-columns: 1fr;
      padding-top: 16px;
      gap: 12px;
    }

    .camera-card {
      padding: 16px 18px;
      gap: 12px;
    }

    .card-model {
      font-size: 16px;
    }

    .chip-res {
      width: 100px;
      font-size: 13px;
    }

    .chip-fps {
      font-size: 17px;
      width: 90px;
    }

    .chip-note {
      font-size: 12px;
    }

    .mode-chip {
      padding: 6px 10px;
      gap: 8px;
    }

    .sort-group {
      margin-left: 0;
      width: 100%;
    }

    .results-count {
      font-size: 18px;
    }

    .results-desc {
      font-size: 14px;
    }

    .text-search-row input {
      width: 100%;
      font-size: 16px;
    }

    .mfr-filter-row {
      gap: 6px;
    }

    .mfr-chip {
      font-size: 12px;
      padding: 5px 10px;
    }

    .intro-block p {
      font-size: 15px;
    }

    .empty {
      padding: 48px 16px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <h1>OVER<span>CRANK</span></h1>
    <span class="tagline">high-speed camera finder</span>
  </div>
</header>

<div class="search-panel">
  <div class="search-panel-inner">
    <div class="search-row">
      <div class="field">
        <label>Min Width (px)</label>
        <input type="number" id="inp-w" placeholder="1920" min="1">
      </div>
      <div class="input-sep">×</div>
      <div class="field">
        <label>Min Height (px)</label>
        <input type="number" id="inp-h" placeholder="1080" min="1">
      </div>
      <div class="input-sep">@</div>
      <div class="field">
        <label>Min FPS</label>
        <input type="number" id="inp-fps" placeholder="1000" min="1">
      </div>
      <div class="search-actions">
        <button id="search">Search</button>
        <button id="clear">Clear</button>
      </div>
    </div>

    <div class="presets-row">
      <span class="presets-label">Presets</span>
      <button class="preset-btn" data-w="7680" data-h="4320">8K</button>
      <button class="preset-btn" data-w="4096" data-h="2160">4K DCI</button>
      <button class="preset-btn" data-w="3840" data-h="2160">4K UHD</button>
      <button class="preset-btn" data-w="2048" data-h="1080">2K DCI</button>
      <button class="preset-btn" data-w="1920" data-h="1080">1080p</button>
      <button class="preset-btn" data-w="1280" data-h="720">720p</button>
      <button class="preset-btn" data-w="1024" data-h="1024">1K sq</button>
      <button class="preset-btn" data-w="640" data-h="480">VGA</button>
    </div>

    <div class="mfr-filter-row" id="mfr-filter"></div>

    <div class="text-search-row">
      <input type="text" id="inp-text" placeholder="Search by camera or brand name...">
    </div>
  </div>
</div>

<div id="intro-block">
  <div class="intro-block">
    <p>Enter your minimum resolution and frame rate requirements. Results show every camera and mode that meets or exceeds those specs, sorted by max FPS at the matched resolution.</p>
    <p>Leave fields empty to browse all cameras.</p>
  </div>
  <div class="db-stats" id="db-stats"></div>
</div>

<div id="results"></div>

<script>
let DB = null;
let currentSort = 'fps'; // 'fps' | 'brand'
let lastResults = [];
let activeBrands = new Set(); // empty = all brands

async function loadDB() {
  const r = await fetch('data/overcrank_db_v7.json?v=' + Date.now());
  DB = await r.json();
  const statsEl = document.getElementById('db-stats');
  statsEl.innerHTML =
    `<span class="stat">${DB.camera_count} cameras</span>` +
    `<span class="dot">·</span>` +
    `<span class="stat">${DB.total_modes} modes</span>` +
    `<span class="dot">·</span>` +
    `<span style="color:var(--text-muted);font-size:13px;">${DB.manufacturers_included.join(', ')}</span>`;
  buildMfrFilter();
}

function buildMfrFilter() {
  const brands = [...new Set(DB.cameras.map(c => c.brand))].sort();
  const container = document.getElementById('mfr-filter');
  let html = '<span class="mfr-label">Brand</span>';
  html += `<button class="mfr-chip all-chip active" data-brand="__all__">All</button>`;
  for (const b of brands) {
    const count = DB.cameras.filter(c => c.brand === b).length;
    html += `<button class="mfr-chip" data-brand="${b}">${b} <span style="color:var(--text-muted);font-size:11px;">${count}</span></button>`;
  }
  container.innerHTML = html;

  container.querySelectorAll('.mfr-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const brand = chip.dataset.brand;
      if (brand === '__all__') {
        activeBrands.clear();
        container.querySelectorAll('.mfr-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
      } else {
        container.querySelector('[data-brand="__all__"]').classList.remove('active');
        chip.classList.toggle('active');
        if (chip.classList.contains('active')) {
          activeBrands.add(brand);
        } else {
          activeBrands.delete(brand);
        }
        if (activeBrands.size === 0) {
          container.querySelector('[data-brand="__all__"]').classList.add('active');
        }
      }
      search();
    });
  });
}

function parseInput() {
  const w = parseInt(document.getElementById('inp-w').value) || 0;
  const h = parseInt(document.getElementById('inp-h').value) || 0;
  const fps = parseInt(document.getElementById('inp-fps').value) || 0;
  const text = (document.getElementById('inp-text').value || '').trim().toLowerCase();
  return { w, h, fps, text };
}

function search() {
  if (!DB) return;
  const { w, h, fps, text } = parseInput();
  const noResFilter = w === 0 && h === 0 && fps === 0;
  const hasAnyFilter = !noResFilter || text || activeBrands.size > 0;

  if (!hasAnyFilter) {
    document.getElementById('intro-block').style.display = '';
    document.getElementById('results').innerHTML = '';
    lastResults = [];
    return;
  }
  document.getElementById('intro-block').style.display = 'none';

  const matches = [];

  for (const cam of DB.cameras) {
    // Brand filter
    if (activeBrands.size > 0 && !activeBrands.has(cam.brand)) continue;

    // Text search
    if (text) {
      const haystack = `${cam.brand} ${cam.model} ${cam.series || ''}`.toLowerCase();
      if (!haystack.includes(text)) continue;
    }

    const matchingModes = cam.modes.filter(m =>
      m.res_width >= (w || 0) &&
      m.res_height >= (h || 0) &&
      m.max_fps >= (fps || 0)
    );

    if (noResFilter || matchingModes.length > 0) {
      const bestFps = noResFilter
        ? Math.max(...cam.modes.map(m => m.max_fps))
        : Math.max(...matchingModes.map(m => m.max_fps));

      matches.push({ cam, matchingModes: noResFilter ? cam.modes : matchingModes, bestFps });
    }
  }

  if (currentSort === 'fps') {
    matches.sort((a, b) => b.bestFps - a.bestFps);
  } else {
    matches.sort((a, b) => {
      if (a.cam.brand < b.cam.brand) return -1;
      if (a.cam.brand > b.cam.brand) return 1;
      return a.cam.model.localeCompare(b.cam.model);
    });
  }

  lastResults = matches;
  render(matches, w, h, fps, noResFilter);
}

function render(matches, w, h, fps, noResFilter) {
  const el = document.getElementById('results');

  if (matches.length === 0) {
    el.innerHTML = `<div class="empty"><h2>No cameras found</h2><p>Try lowering your resolution or FPS requirements.</p></div>`;
    return;
  }

  let filterParts = [];
  if (!noResFilter) {
    let resPart = '';
    if (w > 0) resPart += w + 'px';
    if (w > 0 && h > 0) resPart += ' &times; ';
    if (h > 0) resPart += h + 'px';
    if (fps > 0) resPart += ' at ' + fps.toLocaleString() + ' fps min';
    filterParts.push(resPart);
  }
  const filterDesc = filterParts.length > 0
    ? 'cameras matching ' + filterParts.join(', ')
    : 'all cameras';

  let html = `
    <div class="results-toolbar">
      <span class="results-count">${matches.length}</span>
      <span class="results-desc">${filterDesc}</span>
      <div class="sort-group">
        <span class="sort-label">Sort</span>
        <button class="sort-btn ${currentSort === 'fps' ? 'active' : ''}" onclick="setSort('fps')">Max FPS</button>
        <button class="sort-btn ${currentSort === 'brand' ? 'active' : ''}" onclick="setSort('brand')">Brand</button>
      </div>
    </div>
    <div class="cards-grid">
  `;

  for (const { cam, matchingModes, bestFps } of matches) {
    const isUnverified = cam.data_quality === 'gemini_unverified';
    const badgeHtml = isUnverified
      ? `<span class="badge badge-unverified">Unverified</span>`
      : `<span class="badge badge-verified">Verified</span>`;

    const sensorVal = cam.sensor_size || '—';
    const bitVal = cam.bit_depth ? `${cam.bit_depth}-bit` : '—';
    const priceVal = cam.price_tier || '—';

    const sortedModes = [...matchingModes].sort((a, b) => b.max_fps - a.max_fps);

    const chipsHtml = sortedModes.slice(0, 6).map(m => {
      const isMatch = m.res_width >= w && m.res_height >= h && m.max_fps >= fps && !noResFilter;
      const noteHtml = m.note && m.note !== `${m.res_width}x${m.res_height}`
        ? `<span class="chip-note">${m.note}</span>`
        : '';
      return `<div class="mode-chip ${isMatch ? 'match' : ''}">
        <span class="chip-res">${m.res_width} &times; ${m.res_height}</span>
        <span class="chip-fps">${m.max_fps.toLocaleString()}<span class="chip-fps-unit">fps</span></span>
        ${noteHtml}
      </div>`;
    }).join('');

    const moreCount = sortedModes.length - 6;
    const moreHtml = moreCount > 0
      ? `<div class="more-modes">+${moreCount} more modes</div>`
      : '';

    const statusHtml = cam.status !== 'Current'
      ? `<div class="card-status">${cam.status}</div>`
      : '';

    html += `
      <div class="camera-card">
        <div class="card-header">
          <div class="card-identity">
            <div class="card-brand">${cam.brand}</div>
            <div class="card-model">${cam.model}</div>
            ${statusHtml}
          </div>
          ${badgeHtml}
        </div>
        <div class="card-meta">
          <div class="meta-item">
            <span class="meta-label">Sensor</span>
            <span class="meta-value">${sensorVal}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Bit Depth</span>
            <span class="meta-value">${bitVal}</span>
          </div>
          <div class="meta-item">
            <span class="meta-label">Tier</span>
            <span class="meta-value">${priceVal}</span>
          </div>
        </div>
        <div>
          <div class="card-modes-label">Matching Modes</div>
          <div class="modes-chips">
            ${chipsHtml}
            ${moreHtml}
          </div>
        </div>
      </div>
    `;
  }

  html += `</div>`;
  el.innerHTML = html;
}

function setSort(s) {
  currentSort = s;
  if (lastResults.length > 0) {
    const { w, h, fps } = parseInput();
    const noResFilter = w === 0 && h === 0 && fps === 0;
    if (s === 'fps') {
      lastResults.sort((a, b) => b.bestFps - a.bestFps);
    } else {
      lastResults.sort((a, b) => {
        if (a.cam.brand < b.cam.brand) return -1;
        if (a.cam.brand > b.cam.brand) return 1;
        return a.cam.model.localeCompare(b.cam.model);
      });
    }
    render(lastResults, w, h, fps, noResFilter);
  }
}

document.getElementById('search').addEventListener('click', search);
document.getElementById('clear').addEventListener('click', () => {
  document.getElementById('inp-w').value = '';
  document.getElementById('inp-h').value = '';
  document.getElementById('inp-fps').value = '';
  document.getElementById('inp-text').value = '';
  document.getElementById('intro-block').style.display = '';
  document.getElementById('results').innerHTML = '';
  lastResults = [];
  // Reset brand filter
  activeBrands.clear();
  document.querySelectorAll('.mfr-chip').forEach(c => c.classList.remove('active'));
  const allChip = document.querySelector('[data-brand="__all__"]');
  if (allChip) allChip.classList.add('active');
});

[document.getElementById('inp-w'), document.getElementById('inp-h'), document.getElementById('inp-fps')]
  .forEach(el => el.addEventListener('keydown', e => { if (e.key === 'Enter') search(); }));

// Live text search (debounced)
let textTimer = null;
document.getElementById('inp-text').addEventListener('input', () => {
  clearTimeout(textTimer);
  textTimer = setTimeout(search, 200);
});
document.getElementById('inp-text').addEventListener('keydown', e => { if (e.key === 'Enter') search(); });

// Preset buttons
document.querySelectorAll('.preset-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('inp-w').value = btn.dataset.w;
    document.getElementById('inp-h').value = btn.dataset.h;
    // Keep fps as-is, let user set it
    search();
  });
});

// Clear also deactivates presets
document.getElementById('clear').addEventListener('click', () => {
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
}, true);

// Typing in the inputs deactivates the active preset
[document.getElementById('inp-w'), document.getElementById('inp-h')].forEach(el => {
  el.addEventListener('input', () => {
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  });
});

loadDB();
</script>
