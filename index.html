<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Overcrank — Cinema + High-Speed Camera Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0b0b0b;
    --surface:      #121212;
    --surface-2:    #161616;
    --surface-3:    #1c1c1c;
    --border:       #232323;
    --border-focus: #3a3a3a;
    --accent:       #f0f0f0;
    --accent-dim:   #c8c8c8;
    --accent-glow:  rgba(240,240,240,0.04);
    --text:         #f0f0f0;
    --text-dim:     #9a9a9a;
    --text-muted:   #666666;
    --radius-sm:    0px;
    --radius:       0px;
    --radius-lg:    0px;
    --mono:         'SF Mono', 'Fira Code', 'Consolas', monospace;
    --sans:         'Inter', system-ui, -apple-system, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    font-size: 16px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  header {
    padding: 28px 48px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  header h1 {
    font-family: var(--sans);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.4px;
    color: var(--text);
  }

  header h1 span {
    color: var(--accent);
  }

  header .tagline {
    color: var(--text-muted);
    font-size: 15px;
    font-weight: 400;
    letter-spacing: 0.02em;
    padding-left: 18px;
    border-left: 1px solid var(--border);
  }

  /* ── Sticky summary strip (appears on scroll when results are showing) ── */
  .sticky-summary {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    background: rgba(13,13,13,0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 10px 48px;
    align-items: center;
    gap: 18px;
    font-size: 13px;
    z-index: 40;
    display: none;
  }
  .sticky-summary.show {
    display: flex;
  }
  .sticky-logo {
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text);
    font-size: 14px;
  }
  .sticky-logo span { color: var(--accent); }
  .sticky-echo {
    font-family: var(--mono);
    color: var(--text-dim);
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .sticky-count {
    font-family: var(--mono);
    font-weight: 700;
    color: var(--accent);
  }
  .sticky-edit {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 500;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
  }
  .sticky-edit:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }

  /* ── Hero (shown on empty state; compressed once a query runs) ── */
  .hero {
    padding: 96px 48px 48px;
    text-align: center;
    border-bottom: 1px solid var(--border);
  }
  .hero-eyebrow {
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 28px;
  }
  .hero-title {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2.2px;
    line-height: 1.02;
    color: var(--text);
    margin-bottom: 22px;
    max-width: 920px;
    margin-left: auto;
    margin-right: auto;
  }
  .hero-sub {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    max-width: 640px;
    margin: 0 auto;
    letter-spacing: 0.02em;
  }
  body.has-query .hero { display: none; }

  /* Refinement drawer — collapsed by default in query state, expanded on demand */
  .filter-toggle {
    display: none;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    padding: 6px 12px;
    cursor: pointer;
    margin-top: 14px;
    align-items: center;
    gap: 8px;
    transition: all 0.12s;
  }
  .filter-toggle:hover {
    border-color: var(--text-dim);
    color: var(--text);
  }
  .filter-toggle-icon {
    font-family: var(--mono);
    font-size: 14px;
    line-height: 1;
    display: inline-block;
    transition: transform 0.15s;
  }
  .filter-toggle[aria-expanded="true"] .filter-toggle-icon {
    transform: rotate(45deg);
  }
  body.has-query .filter-toggle {
    display: inline-flex;
  }
  .filter-drawer {
    display: none;
  }
  body.has-query .filter-drawer.open {
    display: block;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  /* Empty state: hide the refinement drawer and its toggle entirely */
  body.no-query .filter-toggle,
  body.no-query .filter-drawer { display: none !important; }

  /* Search form: bigger and centered on empty state */
  body.no-query .search-panel {
    padding: 36px 48px 28px;
    border-bottom: 1px solid var(--border);
  }
  body.no-query .search-panel-inner {
    max-width: 880px;
    margin: 0 auto;
  }
  body.no-query .search-row {
    justify-content: center;
  }
  body.no-query .search-row .field input {
    text-align: center;
  }
  body.no-query .search-row .field label {
    text-align: center;
  }
  body.no-query .presets-row {
    justify-content: center;
    margin-top: 18px;
  }

  /* Empty-state: intro block centered to match hero */
  body.no-query .intro-block {
    text-align: center;
    max-width: none;
    padding: 40px 48px 8px;
  }
  body.no-query .intro-demos {
    justify-content: center;
  }
  body.no-query #db-stats {
    justify-content: center;
    padding: 16px 48px 48px;
  }

  /* ── Search panel (hero input slab) ── */
  .search-panel {
    padding: 28px 48px 22px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  /* Primary input row: the hero of the page */
  .search-row {
    --input-h: 72px;
  }
  .field {
    gap: 6px;
  }
  .field label {
    font-family: var(--mono);
    font-size: 10px !important;
    letter-spacing: 0.18em;
    padding-left: 2px;
  }
  .field input {
    height: var(--input-h);
    font-size: 40px !important;
    font-weight: 600 !important;
    padding: 0 18px !important;
    width: 156px !important;
    background: var(--bg);
    border: 1px solid var(--border);
    letter-spacing: -1px;
  }
  .field input:focus {
    border-color: var(--text-dim);
    background: var(--bg);
    box-shadow: none;
  }
  .input-sep {
    font-family: var(--mono);
    font-size: 32px;
    color: var(--text-muted);
    padding: 0 4px;
    align-self: flex-end;
    padding-bottom: 16px;
  }
  button#search {
    height: var(--input-h);
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.04em;
    padding: 0 32px;
    align-self: flex-end;
  }
  button#clear {
    height: var(--input-h);
    font-size: 14px;
    padding: 0 20px;
    align-self: flex-end;
  }

  .search-panel-inner {
    max-width: 900px;
  }

  .search-row {
    display: flex;
    align-items: flex-end;
    gap: 12px;
    flex-wrap: wrap;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-dim);
  }

  .field input {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: var(--mono);
    font-size: 22px;
    font-weight: 500;
    padding: 14px 18px;
    width: 160px;
    outline: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }

  .field input:focus {
    border-color: var(--border-focus);
    background: var(--surface-3);
    box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
  }

  .field input::placeholder {
    color: var(--text-muted);
    font-family: var(--mono);
  }

  .input-sep {
    font-family: var(--mono);
    font-size: 24px;
    color: var(--text-muted);
    padding-bottom: 12px;
    user-select: none;
  }

  .search-actions {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    padding-bottom: 0;
  }

  button#search {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: var(--radius-sm);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    padding: 13px 26px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    height: 48px;
  }

  button#search:hover {
    background: var(--accent-dim);
  }

  button#search:active {
    transform: scale(0.98);
  }

  button#clear {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: var(--sans);
    font-size: 15px;
    font-weight: 500;
    padding: 13px 20px;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    height: 48px;
  }

  button#clear:hover {
    border-color: var(--border-focus);
    color: var(--text);
  }

  /* ── Presets ── */
  .presets-row {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .presets-label {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-right: 6px;
    flex-shrink: 0;
  }
  .presets-unit {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-muted);
    opacity: 0.6;
    text-transform: lowercase;
    letter-spacing: 0.05em;
    margin-left: 2px;
  }
  .mfr-more {
    color: var(--text-muted) !important;
    font-style: italic;
  }

  .preset-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 2px;
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    padding: 7px 14px;
    cursor: pointer;
    transition: all 0.12s;
    white-space: nowrap;
  }

  .preset-btn:hover {
    border-color: var(--border-focus);
    color: var(--text);
    background: var(--surface-3);
  }

  .preset-btn.active {
    background: var(--text);
    border-color: var(--text);
    color: var(--bg);
    font-weight: 600;
  }

  /* ── Results header / toolbar ── */
  .results-toolbar {
    padding: 16px 48px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .results-count {
    font-family: var(--mono);
    font-size: 24px;
    font-weight: 700;
    color: var(--accent);
  }

  .results-desc {
    font-size: 16px;
    color: var(--text-dim);
  }

  .sort-group {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .sort-label {
    font-size: 13px;
    color: var(--text-muted);
    letter-spacing: 0.02em;
  }

  .sort-btn {
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-dim);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .sort-btn.active {
    border-color: var(--text-dim);
    color: var(--text);
    background: var(--surface-3);
    font-weight: 600;
  }

  .sort-btn:hover:not(.active) {
    border-color: var(--border-focus);
    color: var(--text);
  }

  /* Headroom legend (shown under toolbar when fps filter is active) */
  .hr-legend {
    padding: 10px 48px 6px;
    display: flex;
    align-items: center;
    gap: 20px;
    font-size: 12px;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
  }
  .hr-legend-label {
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hr-legend-item {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--mono);
  }
  .hr-dot {
    width: 8px;
    height: 8px;
    border-radius: 2px;
    display: inline-block;
  }
  .hr-dot-good  { background: var(--accent); }
  .hr-dot-ok    { background: var(--text-dim); }
  .hr-dot-tight { background: var(--text-muted); }

  /* Utility actions (Export, Share) — visually distinct from sort */
  .action-group {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 12px;
    padding-left: 16px;
    border-left: 1px solid var(--border);
  }
  .action-btn {
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--radius-sm);
    color: var(--text-muted);
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    padding: 8px 14px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .action-btn:hover {
    border-color: var(--border-focus);
    color: var(--text);
  }

  /* ── Card grid ── */
  .cards-grid {
    padding: 16px 48px 32px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-width: 1600px;
  }

  .camera-card {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 18px 24px 18px 20px;
    transition: background 0.1s;
    display: grid;
    grid-template-columns: 120px 1fr 300px 100px 90px 110px 48px;
    align-items: center;
    gap: 24px;
    min-height: 92px;
    position: relative;
    cursor: pointer;
  }
  .camera-card:first-child { border-top: 1px solid var(--border); }

  .camera-card:hover {
    border-color: var(--border-focus);
    background: var(--surface-2);
  }

  /* Verified badge */
  .badge {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 3px 9px;
    border-radius: 20px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .badge-verified {
    background: var(--green-bg);
    color: var(--green);
    border: 1px solid var(--green-border);
  }

  .badge-unverified {
    background: var(--orange-bg);
    color: var(--orange);
    border: 1px solid var(--orange-border);
  }

  /* Category tag (used in detail modal) */
  .card-cat-tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-left: 8px;
    padding: 1px 7px;
    border: 1px solid var(--border);
    border-radius: 10px;
    vertical-align: 2px;
  }

  .card-cat-tag.cinema {
    color: #c4b5fd;
    border-color: rgba(196,181,253,0.25);
    background: rgba(196,181,253,0.06);
  }

  .card-cat-tag.high_speed {
    color: var(--accent);
    border-color: rgba(240,240,240,0.08);
    background: var(--accent-glow);
  }

  /* Monochromatic rows; hierarchy through weight, opacity, and a left-edge marker */
  .camera-card:hover { background: var(--surface); }
  .camera-card::before {
    content: '';
    position: absolute;
    left: 0;
    top: 0;
    bottom: -1px;
    width: 2px;
    background: transparent;
  }
  .camera-card.hr-good::before { background: var(--text); }
  .camera-card.hr-ok::before   { background: var(--text-muted); }
  .camera-card.hr-tight        { opacity: 0.58; }
  .camera-card.hr-tight:hover  { opacity: 1; }

  /* ── Listing row internals ── */
  .row-thumb {
    width: 92px;
    height: 86px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .row-thumb svg { width: 72px; height: 58px; opacity: 0.6; stroke-width: 1.5 !important; }
  .row-thumb-label {
    position: absolute;
    bottom: 5px;
    right: 7px;
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  .row-hr {
    display: flex;
    align-items: baseline;
    gap: 3px;
    font-family: var(--mono);
    font-weight: 700;
    letter-spacing: -1px;
  }
  .row-hr .hr-num { font-size: 42px; line-height: 1; color: var(--text); }
  .row-hr .hr-x { font-size: 22px; font-weight: 300; color: var(--text-muted); }
  /* hr tiers: opacity differentiation only, no color — see .camera-card.hr-tight opacity rule above */

  .row-id { min-width: 0; }
  .row-id-top {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.09em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .row-cat {
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    letter-spacing: 0.1em;
    font-size: 11px;
    color: var(--text-dim);
    background: var(--surface-2);
  }
  /* Cinema and high-speed category pills share the same neutral treatment — category is structural, not a signal */

  .row-status {
    display: inline-block;
    margin-left: 8px;
    padding: 2px 8px;
    border-radius: 10px;
    border: 1px solid var(--border);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    text-transform: uppercase;
    vertical-align: 1px;
    background: var(--surface-2);
  }
  .row-id-model {
    font-size: 21px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: -0.3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .row-match { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .row-match-lbl {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .row-match-val {
    font-family: var(--mono);
    font-size: 15px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .row-match-val .big { color: var(--text); font-weight: 700; font-size: 17px; }
  .camera-card.hr-good .row-match-val .big { color: var(--accent); }

  .row-spec { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
  .row-spec-lbl {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
  }
  .row-spec-val {
    font-family: var(--mono);
    font-size: 14px;
    color: var(--text-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* Responsive: stack on narrow viewports */
  @media (max-width: 1100px) {
    .camera-card {
      grid-template-columns: 78px 1fr auto;
      grid-template-areas:
        "thumb id cmp"
        "thumb hr match"
        "thumb specs specs";
      gap: 10px 14px;
      padding-left: 10px !important;
    }
    .camera-card > .row-thumb { grid-area: thumb; }
    .camera-card > .row-hr    { grid-area: hr; padding: 0; }
    .camera-card > .row-id    { grid-area: id; }
    .camera-card > .row-match { grid-area: match; }
    .camera-card > .compare-btn { grid-area: cmp; position: relative !important; top: 0 !important; right: 0 !important; }
    .camera-card > .row-spec  { display: none; }
  }

  /* ── Intro block ── */
  .intro-block {
    padding: 48px 48px 0;
    max-width: 780px;
  }

  .intro-hero {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    line-height: 1.15;
    margin-bottom: 14px;
  }

  .intro-sub {
    font-size: 16px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 24px;

      <button class="intro-demo" data-fps="10000" data-w="1280" data-h="720">10,000 fps @ 720p</button>

  <button class="compare-bar-btn secondary" id="compare-clear" type="button">Clear</button>

<div class="detail-backdrop" id="compare-backdrop" role="dialog" aria-modal="true" aria-label="Compare cameras">
  <div class="compare-modal" id="compare-modal">
    <button class="detail-close" id="compare-close" aria-label="Close">&times;</button>
    <div class="compare-head">
      <h2>Compare</h2>
      <div style="display:flex;align-items:center;gap:14px;">
        <span id="compare-subtitle" style="font-size:12px;color:var(--text-muted);letter-spacing:0.08em;text-transform:uppercase;">0 cameras</span>
        <button class="detail-share-btn" id="compare-copy-link" type="button">Copy Link</button>
        <button class="detail-share-btn" id="compare-copy-md" type="button" title="Copy as Markdown table (paste into Notion)">Copy MD</button>
        <button class="detail-share-btn" id="compare-copy-csv" type="button">Copy CSV</button>
      </div>
    </div>
    <div id="compare-body"></div>
  </div>
</div>

<script>
let DB = null;
let currentSort = 'fps'; // 'fps' | 'brand'
let lastResults = [];
let activeBrands = new Set(); // empty = all brands
let activeMounts = new Set(); // empty = all mounts (cinema only)
let activeCategory = 'all'; // 'all' | 'cinema' | 'high_speed'
let compareSet = new Set(); // cam keys ("Brand|Model"), order preserved by insertion
const COMPARE_MAX = 4;
let compareLastSnapshot = null; // { headers: [label, ...camNames], rows: [[label, ...vals], ...] } for CSV export

async function loadDB() {
  const r = await fetch('data/overcrank_db_v9.json?v=' + Date.now());
  DB = await r.json();
  const statsEl = document.getElementById('db-stats');
  const brandCount = DB.manufacturers_included.length;
  statsEl.innerHTML =
    `<span class="stat">${DB.camera_count.toLocaleString()} cameras</span>` +
    `<span class="dot">·</span>` +
    `<span class="stat">${DB.total_modes.toLocaleString()} modes</span>` +
    `<span class="dot">·</span>` +
    `<span class="stat">${brandCount} brands</span>`;
  buildCatFilter();
  buildMfrFilter();
  buildMountFilter();
  updateCinemaFieldsVisibility();
}

function camerasInCategory(cat) {
  if (cat === 'all') return DB.cameras;
  return DB.cameras.filter(c => (c.category || 'high_speed') === cat);
}

function buildCatFilter() {
  const container = document.getElementById('cat-filter');
  document.getElementById('cat-count-all').textContent = DB.cameras.length;
  document.getElementById('cat-count-cinema').textContent = camerasInCategory('cinema').length;
  document.getElementById('cat-count-high_speed').textContent = camerasInCategory('high_speed').length;

  container.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      container.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeCategory = btn.dataset.cat;
      // Reset brand + mount when category changes
      activeBrands.clear();
      activeMounts.clear();
      buildMfrFilter();
      buildMountFilter();
      updateCinemaFieldsVisibility();
      search();
    });
  });
}

function updateCinemaFieldsVisibility() {
  const showCinema = activeCategory === 'cinema';
  document.getElementById('dr-field').classList.toggle('show', showCinema);
  document.getElementById('mount-filter').classList.toggle('show', showCinema);
  if (!showCinema) {
    document.getElementById('inp-dr').value = '';
    activeMounts.clear();
  }
}

function buildMountFilter() {
  const cinemaCams = camerasInCategory('cinema');
  const mountCounts = {};
  for (const c of cinemaCams) {
    const m = c.lens_mount_native;
    if (!m) continue;
    mountCounts[m] = (mountCounts[m] || 0) + 1;
  }
  // Sort by count desc
  const mounts = Object.keys(mountCounts).sort((a, b) => mountCounts[b] - mountCounts[a]);
  const container = document.getElementById('mount-filter');
  let html = '<span class="mfr-label">Mount</span>';
  for (const m of mounts) {
    html += `<button class="mount-chip" data-mount="${m}">${m} <span style="color:var(--text-muted);font-size:11px;">${mountCounts[m]}</span></button>`;
  }
  container.innerHTML = html;

  container.querySelectorAll('.mount-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const mount = chip.dataset.mount;
      chip.classList.toggle('active');
      if (chip.classList.contains('active')) {
        activeMounts.add(mount);
      } else {
        activeMounts.delete(mount);
      }
      search();
    });
  });
}

let mfrExpanded = false;
const MFR_TOP_N = 6;

function buildMfrFilter() {
  const pool = camerasInCategory(activeCategory);
  const brandCounts = {};
  for (const c of pool) brandCounts[c.brand] = (brandCounts[c.brand] || 0) + 1;
  // Sort brands by count desc, so the top N chips shown are the most-populated ones
  const brands = Object.keys(brandCounts).sort((a, b) => brandCounts[b] - brandCounts[a]);
  // Any brand currently in activeBrands must always be visible even if it's below the top N
  const mustShow = new Set(brands.slice(0, MFR_TOP_N));
  activeBrands.forEach(b => mustShow.add(b));
  const shown = mfrExpanded ? brands : brands.filter(b => mustShow.has(b));
  const hiddenCount = brands.length - shown.length;

  const container = document.getElementById('mfr-filter');
  let html = '<span class="mfr-label">Brand</span>';
  html += `<button class="mfr-chip all-chip ${activeBrands.size === 0 ? 'active' : ''}" data-brand="__all__">All</button>`;
  for (const b of shown) {
    const isActive = activeBrands.has(b);
    html += `<button class="mfr-chip ${isActive ? 'active' : ''}" data-brand="${b}">${b} <span style="color:var(--text-muted);font-size:11px;">${brandCounts[b]}</span></button>`;
  }
  if (hiddenCount > 0) {
    html += `<button class="mfr-chip mfr-more" data-brand="__more__">+ ${hiddenCount} more</button>`;
  } else if (mfrExpanded && brands.length > MFR_TOP_N) {
    html += `<button class="mfr-chip mfr-more" data-brand="__less__">Show less</button>`;
  }
  container.innerHTML = html;

  container.querySelectorAll('.mfr-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      const brand = chip.dataset.brand;
      if (brand === '__all__') {
        activeBrands.clear();
        container.querySelectorAll('.mfr-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        search();
      } else if (brand === '__more__') {
        mfrExpanded = true;
        buildMfrFilter();
      } else if (brand === '__less__') {
        mfrExpanded = false;
        buildMfrFilter();
      } else {
        if (activeBrands.has(brand)) activeBrands.delete(brand);
        else activeBrands.add(brand);
        buildMfrFilter();
        search();
      }
    });
  });
}

// Normalize price_tier display — data has verbose strings like "Purchase (Quote)"
function normalizePriceTier(raw) {
  if (!raw) return '—';
  const s = String(raw).trim();
  // Check compound modes first — "Rental / Purchase (Quote)" is both, not just quote
  if (/rental.*purchase|purchase.*rental|\bboth\b/i.test(s)) return 'Both';
  if (/pre-owned/i.test(s)) return 'Rental';
  if (/legacy/i.test(s)) return 'Legacy';
  if (/rental/i.test(s)) return 'Rental';
  if (/quote/i.test(s)) return 'Quote';
  if (/purchase/i.test(s)) return 'Purchase';
  return s.length > 12 ? s.slice(0, 12) + '…' : s;
}

// Silhouette variant — mapped by brand/category to suggest body form-factor
const CINEMA_BRANDS = new Set(['ARRI', 'RED', 'RED Digital Cinema', 'Sony', 'Canon', 'Blackmagic Design', 'Blackmagic', 'Kinefinity', 'DJI', 'Panasonic', 'Z CAM', 'Z-Cam']);
const COMPACT_BRANDS = new Set(['Freefly', 'Edgertronic', 'Weisscam']);

function thumbSvgFor(cam) {
  const camCat = cam.category || 'high_speed';
  if (camCat === 'cinema' || CINEMA_BRANDS.has(cam.brand)) {
    // Cinema body: tall rectangle + top handle + viewfinder
    return `<svg viewBox="0 0 80 60" fill="none" stroke="#777" stroke-width="1.25">
      <rect x="16" y="12" width="46" height="38" rx="3"/>
      <rect x="20" y="6" width="30" height="6" rx="1"/>
      <circle cx="34" cy="31" r="9"/>
      <circle cx="34" cy="31" r="4" fill="#777" stroke="none" opacity="0.25"/>
      <rect x="62" y="18" width="14" height="18" rx="1"/>
    </svg>`;
  }
  if (COMPACT_BRANDS.has(cam.brand)) {
    // Compact/drone: low-profile horizontal body, lens prominent
    return `<svg viewBox="0 0 80 60" fill="none" stroke="#777" stroke-width="1.25">
      <rect x="8" y="22" width="44" height="22" rx="4"/>
      <circle cx="30" cy="33" r="9"/>
      <circle cx="30" cy="33" r="4" fill="#777" stroke="none" opacity="0.25"/>
      <path d="M52 26 L66 22 L66 44 L52 40 Z"/>
    </svg>`;
  }
  // Studio high-speed (default): boxy with separate control box
  return `<svg viewBox="0 0 80 60" fill="none" stroke="#777" stroke-width="1.25">
    <rect x="6" y="14" width="50" height="32" rx="3"/>
    <circle cx="34" cy="30" r="10"/>
    <circle cx="34" cy="30" r="5" fill="#777" stroke="none" opacity="0.25"/>
    <rect x="56" y="20" width="18" height="20" rx="2"/>
    <rect x="12" y="8" width="8" height="6" rx="1"/>
  </svg>`;
}

function parseInput() {
  const w = parseInt(document.getElementById('inp-w').value) || 0;
  const h = parseInt(document.getElementById('inp-h').value) || 0;
  const fps = parseInt(document.getElementById('inp-fps').value) || 0;
  const text = (document.getElementById('inp-text').value || '').trim().toLowerCase();
  const dr = parseFloat(document.getElementById('inp-dr').value) || 0;
  return { w, h, fps, text, dr };
}

function search() {
  if (!DB) return;
  serializeStateToHash();
  const { w, h, fps, text, dr } = parseInput();
  const noResFilter = w === 0 && h === 0 && fps === 0;
  const hasAnyFilter = !noResFilter || text || activeBrands.size > 0 || activeMounts.size > 0 || dr > 0;

  const hasCatFilter = activeCategory !== 'all';

  if (!hasAnyFilter && !hasCatFilter) {
    document.getElementById('intro-block').style.display = '';
    document.getElementById('results').innerHTML = '';
    document.body.classList.add('no-query');
    document.body.classList.remove('has-query');
    lastResults = [];
    return;
  }
  document.getElementById('intro-block').style.display = 'none';
  document.body.classList.remove('no-query');
  document.body.classList.add('has-query');

  const matches = [];

  for (const cam of DB.cameras) {
    // Category filter
    const camCat = cam.category || 'high_speed';
    if (activeCategory !== 'all' && camCat !== activeCategory) continue;

    // Brand filter
    if (activeBrands.size > 0 && !activeBrands.has(cam.brand)) continue;

    // Mount filter (cinema only)
    if (activeMounts.size > 0 && !activeMounts.has(cam.lens_mount_native)) continue;

    // DR stops filter (cinema only)
    if (dr > 0 && (!cam.dynamic_range_stops || cam.dynamic_range_stops < dr)) continue;

    // Text search
    if (text) {
      const haystack = `${cam.brand} ${cam.model} ${cam.series || ''}`.toLowerCase();
      if (!haystack.includes(text)) continue;
    }

    const matchingModes = cam.modes.filter(m =>
      m.res_width >= (w || 0) &&
      m.res_height >= (h || 0) &&
      m.max_fps >= (fps || 0)
    );

    if (noResFilter || matchingModes.length > 0) {
      const pool = noResFilter ? (cam.modes || []) : matchingModes;
      if (pool.length === 0) continue;
      const bestMode = pool.reduce((a, b) => ((b.max_fps || 0) > (a.max_fps || 0) ? b : a), pool[0]);
      const bestFps = bestMode.max_fps || 0;
      const headroom = fps > 0 && bestFps > 0 ? bestFps / fps : null;

      matches.push({ cam, matchingModes: pool, bestFps, bestMode, headroom });
    }
  }

  if (currentSort === 'fps') {
    matches.sort((a, b) => b.bestFps - a.bestFps);
  } else {
    matches.sort((a, b) => {
      if (a.cam.brand < b.cam.brand) return -1;
      if (a.cam.brand > b.cam.brand) return 1;
      return a.cam.model.localeCompare(b.cam.model);
    });
  }

  lastResults = matches;
  render(matches, w, h, fps, noResFilter);
}

function render(matches, w, h, fps, noResFilter) {
  const el = document.getElementById('results');

  if (matches.length === 0) {
    el.innerHTML = `<div class="empty">
      <h2>No cameras match that spec.</h2>
      <p>Try lowering the frame rate, dropping the resolution, or clearing a brand filter. The biggest jumps tend to come from halving the FPS.</p>
      <div class="empty-actions">
        <button type="button" class="empty-action" onclick="document.getElementById('inp-fps').value=''; search();">Clear FPS</button>
        <button type="button" class="empty-action" onclick="document.getElementById('inp-w').value=''; document.getElementById('inp-h').value=''; search();">Clear resolution</button>
        <button type="button" class="empty-action" onclick="activeBrands.clear(); buildMfrFilter(); search();">Clear brands</button>
      </div>
    </div>`;
    return;
  }

  let filterParts = [];
  if (!noResFilter) {
    let resPart = '';
    if (w > 0) resPart += w + 'px';
    if (w > 0 && h > 0) resPart += ' &times; ';
    if (h > 0) resPart += h + 'px';
    if (fps > 0) resPart += ' at ' + fps.toLocaleString() + ' fps min';
    filterParts.push(resPart);
  }
  const filterDesc = filterParts.length > 0
    ? 'cameras matching ' + filterParts.join(', ')
    : 'all cameras';

  const legendHtml = fps > 0 ? `
    <div class="hr-legend">
      <span class="hr-legend-label">Headroom</span>
      <span class="hr-legend-item"><span class="hr-dot hr-dot-good"></span>Good &ge; 3&times;</span>
      <span class="hr-legend-item"><span class="hr-dot hr-dot-ok"></span>OK 1.5&ndash;3&times;</span>
      <span class="hr-legend-item"><span class="hr-dot hr-dot-tight"></span>Tight &lt; 1.5&times;</span>
    </div>` : '';

  let html = `
    <div class="results-toolbar">
      <span class="results-count">${matches.length}</span>
      <span class="results-desc">${filterDesc}</span>
      <div class="sort-group">
        <span class="sort-label">Sort</span>
        <button class="sort-btn ${currentSort === 'fps' ? 'active' : ''}" onclick="setSort('fps')">Max FPS</button>
        <button class="sort-btn ${currentSort === 'brand' ? 'active' : ''}" onclick="setSort('brand')">Brand</button>
      </div>
      <div class="action-group">
        <button class="action-btn" onclick="exportResultsCSV(this)" title="Copy filtered results as CSV">Export</button>
        <button class="action-btn" onclick="copyShareLink(this)" title="Copy link to these results">Share</button>
      </div>
    </div>
    ${legendHtml}
    <div class="cards-grid">
  `;

  for (const { cam, matchingModes, bestFps, bestMode, headroom } of matches) {
    const camCat = cam.category || 'high_speed';
    const camKey = `${cam.brand}|${cam.model}`;
    const safeKey = camKey.replace(/"/g, '&quot;');
    const inCompare = compareSet.has(camKey);

    // Headroom tier class + display number
    let hrClass = '';
    let hrNumHtml = '<div class="row-hr"></div>';
    if (headroom != null) {
      if (headroom >= 3) hrClass = 'hr-good';
      else if (headroom >= 1.5) hrClass = 'hr-ok';
      else hrClass = 'hr-tight';
      const hrDisplay = headroom >= 10 ? Math.round(headroom) : headroom.toFixed(1);
      hrNumHtml = `<div class="row-hr"><span class="hr-num">${hrDisplay}</span><span class="hr-x">&times;</span></div>`;
    }

    // Best match line (uses bestMode — the top matching mode, or overall top if no fps filter)
    let matchHtml = '<div class="row-match"></div>';
    if (bestMode) {
      const resPart = bestMode.res_width && bestMode.res_height
        ? ` @ ${bestMode.res_width.toLocaleString()} × ${bestMode.res_height.toLocaleString()}`
        : '';
      const matchLabel = headroom != null ? 'Best match' : 'Top mode';
      const fpsPart = bestMode.max_fps ? `<span class="big">${bestMode.max_fps.toLocaleString()}</span> fps` : '<span class="big">—</span>';
      matchHtml = `<div class="row-match">
        <span class="row-match-lbl">${matchLabel}</span>
        <span class="row-match-val">${fpsPart}${resPart}</span>
      </div>`;
    }

    // Three spec slots, category-aware
    const specs = [];
    if (camCat === 'cinema') {
      if (cam.dynamic_range_stops) specs.push({ lbl: 'DR Stops', val: cam.dynamic_range_stops });
      if (cam.sensor_format) specs.push({ lbl: 'Format', val: cam.sensor_format });
      if (cam.lens_mount_native) specs.push({ lbl: 'Mount', val: cam.lens_mount_native });
      if (cam.bit_depth && specs.length < 3) specs.push({ lbl: 'Bit', val: cam.bit_depth + '-bit' });
    } else {
      specs.push({ lbl: 'Sensor', val: cam.sensor_size || '—' });
      specs.push({ lbl: 'Bit', val: cam.bit_depth ? cam.bit_depth + '-bit' : '—' });
      specs.push({ lbl: 'Available', val: normalizePriceTier(cam.price_tier) });
    }
    while (specs.length < 3) specs.push({ lbl: '', val: '' });
    const specsHtml = specs.slice(0, 3).map(s =>
      `<div class="row-spec">${s.lbl ? `<span class="row-spec-lbl">${s.lbl}</span><span class="row-spec-val">${s.val}</span>` : ''}</div>`
    ).join('');

    const catLabel = camCat === 'cinema' ? 'Cinema' : 'High-Speed';
    const brand = cam.brand || 'CAM';
    const thumbLabel = brand.length > 4 ? brand.replace(/\s+/g, '').slice(0, 4).toUpperCase() : brand.toUpperCase();
    // Status chip only when non-Current — decision-useful signal for legacy/discontinued cams
    const statusChipHtml = cam.status && cam.status !== 'Current' && cam.status !== 'Active'
      ? `<span class="row-status">${cam.status.replace(/\(.*?\)/g, '').split(/[\s\-]+/).filter(w => /[a-z]/i.test(w)).slice(0, 2).join(' ')}</span>`
      : '';

    html += `
      <div class="camera-card ${hrClass}" data-cam-key="${safeKey}" tabindex="0" role="button" aria-label="View full spec for ${cam.brand} ${cam.model}">
        ${hrNumHtml}
        <div class="row-id">
          <div class="row-id-top">${cam.brand} <span class="row-cat ${camCat}">${catLabel}</span>${statusChipHtml}</div>
          <div class="row-id-model">${cam.model}</div>
        </div>
        ${matchHtml}
        ${specsHtml}
        <button class="compare-btn ${inCompare ? 'active' : ''}" data-cam-key="${safeKey}" aria-label="Add to compare" aria-pressed="${inCompare}" title="Add to compare">${inCompare ? '&#10003;' : '+'}</button>
      </div>
    `;
  }

  html += `</div>`;
  el.innerHTML = html;

  // Wire up card clicks to open detail modal
  el.querySelectorAll('.camera-card').forEach(card => {
    const open = () => openCameraDetail(card.dataset.camKey);
    card.addEventListener('click', (e) => {
      if (e.target.closest('.compare-btn')) return; // compare button handled separately
      open();
    });
    card.addEventListener('keydown', (e) => {
      if (e.target.classList.contains('compare-btn')) return;
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(); }
    });
  });
  el.querySelectorAll('.compare-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleCompare(btn.dataset.camKey, btn);
    });
  });
}

function openCameraDetail(camKey) {
  if (!DB) return;
  const [brand, model] = camKey.split('|');
  const cam = DB.cameras.find(c => c.brand === brand && c.model === model);
  if (!cam) return;

  const camCat = cam.category || 'high_speed';
  const isUnverified = cam.data_quality === 'gemini_unverified';
  const isNeedsReview = cam.data_quality === 'needs_review';
  const catTagHtml = camCat === 'cinema'
    ? `<span class="card-cat-tag cinema">Cinema</span>`
    : `<span class="card-cat-tag high_speed">High-Speed</span>`;
  let badgeHtml;
  if (isNeedsReview) badgeHtml = `<span class="badge badge-unverified">Needs Review</span>`;
  else if (isUnverified) badgeHtml = `<span class="badge badge-unverified">Unverified</span>`;
  else badgeHtml = `<span class="badge badge-verified">Verified</span>`;

  const specs = [];
  const addSpec = (label, value, opts = {}) => {
    if (value === null || value === undefined || value === '') return;
    if (Array.isArray(value)) { if (!value.length) return; value = value.join(', '); }
    const cls = opts.accent ? 'accent' : (opts.strong ? 'strong' : '');
    specs.push(`<div class="detail-spec"><span class="detail-spec-label">${label}</span><span class="detail-spec-value ${cls}">${value}</span></div>`);
  };

  if (camCat === 'cinema') {
    addSpec('DR Stops', cam.dynamic_range_stops, { accent: true });
    addSpec('Sensor Format', cam.sensor_format, { strong: true });
    addSpec('Sensor Size', cam.sensor_size);
    addSpec('Crop Factor', cam.crop_factor ? cam.crop_factor + 'x' : null);
    addSpec('Native Res', cam.native_resolution);
    addSpec('Max Rec Res', cam.max_resolution_recording);
    addSpec('Bit Depth', cam.bit_depth ? cam.bit_depth + '-bit' : null);
    const isoLabel = cam.dual_native_iso ? 'Dual Native ISO' : 'Base ISO';
    addSpec(isoLabel, cam.base_iso);
    addSpec('Lens Mount', cam.lens_mount_native, { strong: true });
    addSpec('Other Mounts', cam.other_mounts);
    addSpec('ND Filter', cam.nd_filter);
    addSpec('Codecs', cam.codecs);
    addSpec('Media', cam.media);
    addSpec('Max Shutter', cam.max_shutter_angle ? cam.max_shutter_angle + '°' : null);
    addSpec('Price Tier', cam.price_tier);
    addSpec('Price USD', cam.price_usd ? '$' + cam.price_usd.toLocaleString() : null);
  } else {
    addSpec('Sensor Size', cam.sensor_size, { strong: true });
    addSpec('Crop Factor', cam.crop_factor ? cam.crop_factor + 'x' : null);
    addSpec('Bit Depth', cam.bit_depth ? cam.bit_depth + '-bit' : null);
    addSpec('Price Tier', cam.price_tier);
    addSpec('Price USD', cam.price_usd ? '$' + cam.price_usd.toLocaleString() : null);
  }

  const sortedModes = [...(cam.modes || [])].sort((a, b) => (b.max_fps || 0) - (a.max_fps || 0));
  const hasCodec = sortedModes.some(m => m.codec);
  const hasType = sortedModes.some(m => m.mode_type && m.mode_type !== 'standard');
  const hasNote = sortedModes.some(m => m.note && m.note !== `${m.res_width}x${m.res_height}`);

  let modeRowsHtml = '';
  for (const m of sortedModes) {
    const resCell = m.res_width && m.res_height ? `${m.res_width} &times; ${m.res_height}` : (m.note || '—');
    const fpsCell = m.max_fps ? m.max_fps.toLocaleString() + ' fps' : '—';
    const typeCell = (m.mode_type && m.mode_type !== 'standard') ? `<span class="mode-badge">${m.mode_type}</span>` : '';
    const codecCell = m.codec ? `<span class="mode-badge">${m.codec}</span>` : '';
    const noteCell = (m.note && m.note !== `${m.res_width}x${m.res_height}`) ? m.note : '';
    modeRowsHtml += `<tr>
      <td class="res-cell">${resCell}</td>
      <td class="fps-cell">${fpsCell}</td>
      ${hasType ? `<td>${typeCell}</td>` : ''}
      ${hasCodec ? `<td>${codecCell}</td>` : ''}
      ${hasNote ? `<td>${noteCell}</td>` : ''}
    </tr>`;
  }

  const modeTableHtml = sortedModes.length > 0 ? `
    <div class="detail-section">
      <div class="detail-section-label">All Modes (${sortedModes.length})</div>
      <div style="overflow-x:auto;">
      <table class="detail-mode-table">
        <thead>
          <tr>
            <th>Resolution</th>
            <th>Max FPS</th>
            ${hasType ? '<th>Mode</th>' : ''}
            ${hasCodec ? '<th>Codec</th>' : ''}
            ${hasNote ? '<th>Note</th>' : ''}
          </tr>
        </thead>
        <tbody>${modeRowsHtml}</tbody>
      </table>
      </div>
    </div>
  ` : '';

  const hybridHtml = cam.hybrid_note ? `
    <div class="detail-section">
      <div class="detail-section-label">Note</div>
      <div style="font-size:13px;color:var(--text-dim);line-height:1.6;">${cam.hybrid_note}</div>
    </div>
  ` : '';

  const sourceHtml = cam.source_url
    ? `<div><span style="color:var(--text-muted);font-size:11px;letter-spacing:0.08em;text-transform:uppercase;">Source</span><br><a href="${cam.source_url}" target="_blank" rel="noopener">${cam.source_url}</a></div>`
    : `<div style="color:var(--text-muted);font-size:12px;">No source URL</div>`;

  const body = `
    <div class="detail-head">
      <div>
        <div class="detail-brand">${cam.brand}${catTagHtml}</div>
        <div class="detail-model" id="detail-model">${cam.model}</div>
        ${cam.series ? `<div class="detail-status">${cam.series}</div>` : ''}
        ${cam.status && cam.status !== 'Current' ? `<div class="detail-status">Status: ${cam.status}</div>` : ''}
      </div>
      ${badgeHtml}
    </div>
    <div class="detail-section">
      <div class="detail-section-label">Specifications</div>
      <div class="detail-specs-grid">${specs.join('')}</div>
    </div>
    ${hybridHtml}
    ${modeTableHtml}
    <div class="detail-source">
      ${sourceHtml}
      <button class="detail-share-btn" id="detail-share">Copy Link</button>
    </div>
  `;

  document.getElementById('detail-body').innerHTML = body;
  document.getElementById('detail-backdrop').classList.add('show');
  document.body.style.overflow = 'hidden';

  const shareBtn = document.getElementById('detail-share');
  if (shareBtn) {
    shareBtn.addEventListener('click', () => {
      const url = window.location.origin + window.location.pathname + '#cam=' + encodeURIComponent(camKey);
      navigator.clipboard.writeText(url).then(() => {
        shareBtn.textContent = 'Copied';
        setTimeout(() => { shareBtn.textContent = 'Copy Link'; }, 1500);
      }).catch(() => {
        shareBtn.textContent = 'Press Ctrl+C';
      });
    });
  }
}

function closeCameraDetail() {
  document.getElementById('detail-backdrop').classList.remove('show');
  document.body.style.overflow = '';
}

// ── Compare ──
function toggleCompare(camKey, btnEl) {
  if (compareSet.has(camKey)) {
    compareSet.delete(camKey);
  } else {
    if (compareSet.size >= COMPARE_MAX) {
      if (btnEl) {
        const orig = btnEl.innerHTML;
        btnEl.innerHTML = '!';
        btnEl.title = 'Max ' + COMPARE_MAX + ' cameras';
        setTimeout(() => { btnEl.innerHTML = orig; btnEl.title = 'Add to compare'; }, 900);
      }
      return;
    }
    compareSet.add(camKey);
  }
  // Update this button immediately
  if (btnEl) {
    const active = compareSet.has(camKey);
    btnEl.classList.toggle('active', active);
    btnEl.setAttribute('aria-pressed', String(active));
    btnEl.innerHTML = active ? '&#10003;' : '+';
  }
  // Sync any other buttons pointing at the same cam (shouldn't happen, but safe)
  document.querySelectorAll(`.compare-btn[data-cam-key="${camKey.replace(/"/g, '&quot;')}"]`).forEach(b => {
    if (b === btnEl) return;
    const active = compareSet.has(camKey);
    b.classList.toggle('active', active);
    b.setAttribute('aria-pressed', String(active));
    b.innerHTML = active ? '&#10003;' : '+';
  });
  updateCompareBar();
}

function updateCompareBar() {
  const bar = document.getElementById('compare-bar');
  const count = compareSet.size;
  document.getElementById('compare-count').textContent = count;
  bar.classList.toggle('show', count > 0);
  const openBtn = document.getElementById('compare-open');
  if (openBtn) openBtn.disabled = count < 2;
  if (openBtn) openBtn.style.opacity = count < 2 ? '0.5' : '1';
  serializeStateToHash();
}

function clearCompare() {
  compareSet.clear();
  document.querySelectorAll('.compare-btn.active').forEach(b => {
    b.classList.remove('active');
    b.setAttribute('aria-pressed', 'false');
    b.innerHTML = '+';
  });
  updateCompareBar();
  closeCompareModal();
}

function openCompareModal() {
  if (compareSet.size < 2 || !DB) return;
  const cams = [...compareSet].map(k => {
    const [brand, model] = k.split('|');
    return DB.cameras.find(c => c.brand === brand && c.model === model);
  }).filter(Boolean);
  if (cams.length < 2) return;

  document.getElementById('compare-subtitle').textContent = `${cams.length} camera${cams.length > 1 ? 's' : ''}`;

  const fmtArr = (v) => Array.isArray(v) ? (v.length ? v.join(', ') : '—') : (v === null || v === undefined || v === '' ? '—' : v);
  const fmtBit = (v) => v ? v + '-bit' : '—';
  const fmtCrop = (v) => v ? v + 'x' : '—';
  const fmtUSD = (v) => v ? '$' + v.toLocaleString() : '—';
  const fmtDeg = (v) => v ? v + '°' : '—';

  const rows = [
    { label: 'Category', get: c => (c.category || 'high_speed') === 'cinema' ? 'Cinema' : 'High-Speed' },
    { label: 'Max FPS', get: c => {
        const modes = c.modes || [];
        const fpsVals = modes.map(m => m.max_fps).filter(v => typeof v === 'number');
        return fpsVals.length ? Math.max(...fpsVals).toLocaleString() + ' fps' : '—';
      }, accent: true },
    { label: 'Max Resolution', get: c => {
        const modes = c.modes || [];
        const max = modes.reduce((best, m) => {
          const px = (m.res_width || 0) * (m.res_height || 0);
          return px > (best.px || 0) ? { px, m } : best;
        }, { px: 0 });
        return max.m ? `${max.m.res_width} × ${max.m.res_height}` : '—';
      }
    },
    { label: 'Modes', get: c => (c.modes || []).length },
    { label: 'Sensor Format', get: c => fmtArr(c.sensor_format) },
    { label: 'Sensor Size', get: c => fmtArr(c.sensor_size) },
    { label: 'Crop Factor', get: c => fmtCrop(c.crop_factor) },
    { label: 'Native Res', get: c => fmtArr(c.native_resolution) },
    { label: 'Max Rec Res', get: c => fmtArr(c.max_resolution_recording) },
    { label: 'Bit Depth', get: c => fmtBit(c.bit_depth) },
    { label: 'Dynamic Range', get: c => c.dynamic_range_stops ? c.dynamic_range_stops + ' stops' : '—', accent: true },
    { label: 'Base ISO', get: c => fmtArr(c.base_iso) },
    { label: 'Dual Native ISO', get: c => c.dual_native_iso === true ? 'Yes' : (c.dual_native_iso === false ? 'No' : '—') },
    { label: 'Lens Mount', get: c => fmtArr(c.lens_mount_native) },
    { label: 'Other Mounts', get: c => fmtArr(c.other_mounts) },
    { label: 'ND Filter', get: c => fmtArr(c.nd_filter) },
    { label: 'Codecs', get: c => fmtArr(c.codecs) },
    { label: 'Media', get: c => fmtArr(c.media) },
    { label: 'Max Shutter', get: c => fmtDeg(c.max_shutter_angle) },
    { label: 'Price Tier', get: c => fmtArr(c.price_tier) },
    { label: 'Price USD', get: c => fmtUSD(c.price_usd) },
    { label: 'Status', get: c => fmtArr(c.status) },
    { label: 'Data Quality', get: c => fmtArr(c.data_quality) },
  ];

  // Build header row
  let thead = '<thead><tr><th></th>';
  for (const cam of cams) {
    const key = `${cam.brand}|${cam.model}`.replace(/"/g, '&quot;');
    thead += `<td>
      <button class="cam-remove" data-cam-key="${key}" title="Remove">&times;</button>
      <span class="cam-brand">${cam.brand}</span>${cam.model}
    </td>`;
  }
  thead += '</tr></thead>';

  // Build body rows, skip rows where every cam is "—". Capture CSV snapshot along the way.
  const snapRows = [];
  let tbody = '<tbody>';
  for (const row of rows) {
    const vals = cams.map(c => String(row.get(c)));
    if (vals.every(v => v === '—')) continue;
    snapRows.push([row.label, ...vals]);
    const allSame = vals.every(v => v === vals[0]);
    const diffClass = !allSame && vals.length > 1 ? 'diff-row' : '';
    tbody += `<tr class="${diffClass}">
      <th>${row.label}</th>
      ${vals.map(v => `<td class="${row.accent ? 'accent' : ''}">${v}</td>`).join('')}
    </tr>`;
  }
  tbody += '</tbody>';
  compareLastSnapshot = {
    headers: ['Spec', ...cams.map(c => `${c.brand} ${c.model}`)],
    rows: snapRows,
  };

  document.getElementById('compare-body').innerHTML = `
    <div class="compare-table-wrap">
      <table class="compare-table">${thead}${tbody}</table>
    </div>
  `;

  // Wire up remove buttons
  document.querySelectorAll('#compare-body .cam-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      const key = btn.dataset.camKey;
      compareSet.delete(key);
      // Update any card compare button on the page
      document.querySelectorAll(`.compare-btn[data-cam-key="${key.replace(/"/g, '&quot;')}"]`).forEach(b => {
        b.classList.remove('active');
        b.setAttribute('aria-pressed', 'false');
        b.innerHTML = '+';
      });
      updateCompareBar();
      if (compareSet.size < 2) closeCompareModal();
      else openCompareModal(); // re-render with remaining
    });
  });

  // Wire up Copy Link and Copy CSV
  const linkBtn = document.getElementById('compare-copy-link');
  if (linkBtn) {
    linkBtn.onclick = () => {
      serializeStateToHash();
      const url = window.location.href;
      navigator.clipboard.writeText(url).then(() => {
        const orig = linkBtn.textContent;
        linkBtn.textContent = 'Copied';
        setTimeout(() => { linkBtn.textContent = orig; }, 1500);
      });
    };
  }
  const csvBtn = document.getElementById('compare-copy-csv');
  if (csvBtn) {
    csvBtn.onclick = () => {
      if (!compareLastSnapshot) return;
      const esc = (v) => {
        const s = String(v);
        if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
        return s;
      };
      const lines = [compareLastSnapshot.headers.map(esc).join(',')];
      for (const r of compareLastSnapshot.rows) lines.push(r.map(esc).join(','));
      const csv = lines.join('\n');
      navigator.clipboard.writeText(csv).then(() => {
        const orig = csvBtn.textContent;
        csvBtn.textContent = 'Copied';
        setTimeout(() => { csvBtn.textContent = orig; }, 1500);
      });
    };
  }
  const mdBtn = document.getElementById('compare-copy-md');
  if (mdBtn) {
    mdBtn.onclick = () => {
      if (!compareLastSnapshot) return;
      // Escape pipe and newline for markdown pipe-table cells
      const cell = (v) => String(v).replace(/\|/g, '\\|').replace(/\n/g, '<br>');
      const header = '| ' + compareLastSnapshot.headers.map(cell).join(' | ') + ' |';
      const sep = '|' + compareLastSnapshot.headers.map(() => '---').join('|') + '|';
      const body = compareLastSnapshot.rows
        .map(r => '| ' + r.map(cell).join(' | ') + ' |')
        .join('\n');
      const md = [header, sep, body].join('\n');
      navigator.clipboard.writeText(md).then(() => {
        const orig = mdBtn.textContent;
        mdBtn.textContent = 'Copied';
        setTimeout(() => { mdBtn.textContent = orig; }, 1500);
      });
    };
  }

  document.getElementById('compare-backdrop').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeCompareModal() {
  document.getElementById('compare-backdrop').classList.remove('show');
  if (!document.getElementById('detail-backdrop').classList.contains('show')) {
    document.body.style.overflow = '';
  }
}

// ── URL state ──
let suppressHashSync = false;

function serializeStateToHash() {
  if (suppressHashSync) return;
  const parts = [];
  const w = document.getElementById('inp-w').value;
  const h = document.getElementById('inp-h').value;
  const fps = document.getElementById('inp-fps').value;
  const text = document.getElementById('inp-text').value;
  const dr = document.getElementById('inp-dr').value;
  if (w) parts.push('w=' + encodeURIComponent(w));
  if (h) parts.push('h=' + encodeURIComponent(h));
  if (fps) parts.push('fps=' + encodeURIComponent(fps));
  if (text) parts.push('q=' + encodeURIComponent(text));
  if (dr) parts.push('dr=' + encodeURIComponent(dr));
  if (activeCategory !== 'all') parts.push('cat=' + activeCategory);
  if (activeBrands.size > 0) parts.push('brands=' + encodeURIComponent([...activeBrands].join(',')));
  if (activeMounts.size > 0) parts.push('mounts=' + encodeURIComponent([...activeMounts].join(',')));
  if (currentSort !== 'fps') parts.push('sort=' + currentSort);
  if (compareSet.size > 0) parts.push('cmp=' + encodeURIComponent([...compareSet].join(',')));
  const newHash = parts.length ? '#' + parts.join('&') : '';
  if (newHash !== window.location.hash) {
    history.replaceState(null, '', window.location.pathname + window.location.search + newHash);
  }
}

function hydrateFromHash() {
  const hash = window.location.hash.replace(/^#/, '');
  if (!hash) return false;
  const params = {};
  hash.split('&').forEach(p => {
    const [k, v] = p.split('=');
    if (k) params[k] = decodeURIComponent(v || '');
  });
  // Camera detail deep-link
  if (params.cam) {
    setTimeout(() => openCameraDetail(params.cam), 50);
  }
  // Filter hydrate
  let anyFilter = false;
  if (params.w) { document.getElementById('inp-w').value = params.w; anyFilter = true; }
  if (params.h) { document.getElementById('inp-h').value = params.h; anyFilter = true; }
  if (params.fps) { document.getElementById('inp-fps').value = params.fps; anyFilter = true; }
  if (params.q) { document.getElementById('inp-text').value = params.q; anyFilter = true; }
  if (params.dr) { document.getElementById('inp-dr').value = params.dr; anyFilter = true; }
  if (params.cat && ['all', 'cinema', 'high_speed'].includes(params.cat)) {
    activeCategory = params.cat;
    const container = document.getElementById('cat-filter');
    if (container) {
      container.querySelectorAll('.cat-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.cat === params.cat);
      });
    }
    anyFilter = true;
  }
  if (params.brands) {
    activeBrands = new Set(params.brands.split(',').filter(Boolean));
    anyFilter = true;
  }
  if (params.mounts) {
    activeMounts = new Set(params.mounts.split(',').filter(Boolean));
    anyFilter = true;
  }
  if (params.sort && ['fps', 'brand'].includes(params.sort)) {
    currentSort = params.sort;
    anyFilter = true;
  }
  if (params.cmp) {
    compareSet = new Set(params.cmp.split(',').filter(Boolean));
  }
  // Sync preset buttons to input values
  syncPresetButtons();
  return anyFilter;
}

function syncPresetButtons() {
  const w = document.getElementById('inp-w').value;
  const h = document.getElementById('inp-h').value;
  const fps = document.getElementById('inp-fps').value;
  document.querySelectorAll('.preset-btn.res-preset').forEach(b => {
    b.classList.toggle('active', b.dataset.w === w && b.dataset.h === h);
  });
  document.querySelectorAll('.preset-btn.fps-preset').forEach(b => {
    b.classList.toggle('active', b.dataset.fps === fps);
  });
}

function copyShareLink(btn) {
  serializeStateToHash();
  const url = window.location.href;
  navigator.clipboard.writeText(url).then(() => {
    const orig = btn.textContent;
    btn.textContent = 'Copied';
    setTimeout(() => { btn.textContent = orig; }, 1500);
  }).catch(() => {
    btn.textContent = 'Ctrl+C';
  });
}

function exportResultsCSV(btn) {
  if (!lastResults || lastResults.length === 0) {
    if (btn) {
      const o = btn.textContent;
      btn.textContent = 'No results';
      setTimeout(() => { btn.textContent = o; }, 1500);
    }
    return;
  }
  const esc = (v) => {
    const s = v == null ? '' : String(v);
    if (/[",\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
    return s;
  };
  const headers = [
    'Brand','Model','Category','Status','Best FPS',
    'Sensor Format','Sensor Size','DR Stops','Bit Depth',
    'Mount','Base ISO','ND Filter','Price Tier',
    'Data Quality','All Modes','Source URL'
  ];
  const lines = [headers.map(esc).join(',')];
  for (const { cam, bestFps } of lastResults) {
    const modesStr = (cam.modes || [])
      .slice()
      .sort((a, b) => (b.max_fps || 0) - (a.max_fps || 0))
      .map(m => {
        const res = m.res_width && m.res_height ? `${m.res_width}x${m.res_height}` : '—';
        const fps = m.max_fps ? `@${m.max_fps}` : '';
        const noteSuffix = m.note && m.note !== res ? ` (${m.note})` : '';
        return `${res}${fps}${noteSuffix}`;
      })
      .join('; ');
    const baseIso = Array.isArray(cam.base_iso) ? cam.base_iso.join(' / ') : (cam.base_iso || '');
    lines.push([
      cam.brand || '',
      cam.model || '',
      cam.category || 'high_speed',
      cam.status || '',
      bestFps || '',
      cam.sensor_format || '',
      cam.sensor_size || '',
      cam.dynamic_range_stops || '',
      cam.bit_depth || '',
      cam.lens_mount_native || '',
      baseIso,
      cam.nd_filter || '',
      cam.price_tier || '',
      cam.data_quality || '',
      modesStr,
      cam.source_url || '',
    ].map(esc).join(','));
  }
  const csv = lines.join('\n');
  navigator.clipboard.writeText(csv).then(() => {
    if (btn) {
      const o = btn.textContent;
      btn.textContent = 'Copied';
      setTimeout(() => { btn.textContent = o; }, 1500);
    }
  }).catch(() => {
    if (btn) btn.textContent = 'Copy failed';
  });
}

function setSort(s) {
  currentSort = s;
  if (lastResults.length > 0) {
    const { w, h, fps } = parseInput();
    const noResFilter = w === 0 && h === 0 && fps === 0;
    if (s === 'fps') {
      lastResults.sort((a, b) => b.bestFps - a.bestFps);
    } else {
      lastResults.sort((a, b) => {
        if (a.cam.brand < b.cam.brand) return -1;
        if (a.cam.brand > b.cam.brand) return 1;
        return a.cam.model.localeCompare(b.cam.model);
      });
    }
    render(lastResults, w, h, fps, noResFilter);
  }
}

// Filter drawer toggle
(function wireFilterToggle() {
  const toggle = document.getElementById('filter-toggle');
  const drawer = document.getElementById('filter-drawer');
  if (!toggle || !drawer) return;
  toggle.addEventListener('click', () => {
    const expanded = toggle.getAttribute('aria-expanded') === 'true';
    toggle.setAttribute('aria-expanded', expanded ? 'false' : 'true');
    drawer.classList.toggle('open', !expanded);
    toggle.querySelector('.filter-toggle-label').textContent = expanded ? 'Refine' : 'Hide refine';
  });
})();

function wireStickySummary() {
  const bar = document.getElementById('sticky-summary');
  const echo = document.getElementById('sticky-echo');
  const count = document.getElementById('sticky-count');
  const edit = document.getElementById('sticky-edit');
  let visible = false;
  function updateContent() {
    const { w, h, fps } = parseInput();
    const parts = [];
    if (fps) parts.push(fps.toLocaleString() + ' fps');
    if (w || h) parts.push((w || '?') + ' × ' + (h || '?'));
    if (activeCategory === 'cinema') parts.push('Cinema');
    else if (activeCategory === 'high_speed') parts.push('High-Speed');
    if (activeBrands.size > 0) parts.push([...activeBrands].join(', '));
    echo.textContent = parts.length ? parts.join(' · ') : 'all cameras';
    count.textContent = lastResults.length ? lastResults.length + ' cameras' : '';
  }
  function onScroll() {
    const shouldShow = document.body.classList.contains('has-query') && window.scrollY > 180;
    if (shouldShow === visible) return;
    visible = shouldShow;
    if (shouldShow) {
      updateContent();
      bar.classList.add('show');
    } else {
      bar.classList.remove('show');
    }
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  edit.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
}

// Modal close handlers
document.getElementById('detail-close').addEventListener('click', closeCameraDetail);

  if (e.target.id === 'detail-backdrop') closeCameraDetail();
});
document.getElementById('compare-close').addEventListener('click', closeCompareModal);

  if (e.target.id === 'compare-backdrop') closeCompareModal();
});
document.getElementById('compare-open').addEventListener('click', openCompareModal);
document.getElementById('compare-clear').addEventListener('click', clearCompare);
document.addEventListener('keydown', (e) => {
  // Escape always closes modals, even when typing
  if (e.key === 'Escape') {
    if (document.getElementById('compare-backdrop').classList.contains('show')) closeCompareModal();
    else if (document.getElementById('detail-backdrop').classList.contains('show')) closeCameraDetail();
    return;
  }

  // Skip other shortcuts while typing or with modifiers held
  const tgt = e.target;
  if (tgt && (tgt.tagName === 'INPUT' || tgt.tagName === 'TEXTAREA' || tgt.isContentEditable)) return;
  if (e.ctrlKey || e.metaKey || e.altKey) return;

  // "/" → focus the text search
  if (e.key === '/') {
    const txt = document.getElementById('inp-text');
    if (txt) {
      e.preventDefault();
      txt.focus();
      txt.select();
    }
    return;
  }

  // "c" → open compare modal if ≥2 selected
  if (e.key === 'c' || e.key === 'C') {
    if (compareSet.size >= 2) {
      e.preventDefault();
      openCompareModal();
    }
    return;
  }

  // Arrow keys → step focus across visible cards
  if (['ArrowRight','ArrowDown','ArrowLeft','ArrowUp'].includes(e.key)) {
    const cards = Array.from(document.querySelectorAll('.camera-card'));
    if (cards.length === 0) return;
    const active = document.activeElement;
    const idx = cards.indexOf(active);
    const dir = (e.key === 'ArrowRight' || e.key === 'ArrowDown') ? 1 : -1;
    if (idx === -1) {
      e.preventDefault();
      cards[0].focus();
      return;
    }
    const next = Math.max(0, Math.min(cards.length - 1, idx + dir));
    if (next !== idx) {
      e.preventDefault();
      cards[next].focus();
      cards[next].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }
});

loadDB().then(() => {
  // Hydrate filters from URL hash, then rebuild filter UIs so chip active states match
  suppressHashSync = true;
  const hadFilters = hydrateFromHash();
  // Rebuild filter bars so active brand/mount chips reflect the hydrated sets
  buildMfrFilter();
  buildMountFilter();
  // Reflect active state on brand chips
  if (activeBrands.size > 0) {
    const mfr = document.getElementById('mfr-filter');
    mfr.querySelector('[data-brand="__all__"]').classList.remove('active');
    mfr.querySelectorAll('.mfr-chip').forEach(chip => {
      if (activeBrands.has(chip.dataset.brand)) chip.classList.add('active');
    });
  }
  if (activeMounts.size > 0) {
    document.getElementById('mount-filter').querySelectorAll('.mount-chip').forEach(chip => {
      if (activeMounts.has(chip.dataset.mount)) chip.classList.add('active');
    });
  }
  // Reflect active sort
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  updateCinemaFieldsVisibility();
  suppressHashSync = false;
  if (hadFilters) {
    search();
  } else {
    document.body.classList.add('no-query');
  }
  wireStickySummary();
  // Reflect compare state (rendered cards after search) and auto-open if ≥2
  if (compareSet.size > 0) {
    updateCompareBar();
    if (compareSet.size >= 2) {
      setTimeout(() => openCompareModal(), 100);
    }
  }
});
